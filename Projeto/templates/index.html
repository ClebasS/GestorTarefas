<!DOCTYPE html>
<html>
<head>
    <title>Gestor de Tarefas</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css">
</head>
<body>

    <div class="container">

        <h1>Gestor de Tarefas</h1>

        <div class="form">

            <input id="titulo" placeholder="Título">
            <select id="prioridade">
                <option value="Alta">Alta</option>
                <option value="Média">Média</option>
                <option value="Baixa">Baixa</option>
            </select>

            <button onclick="adicionar()">Adicionar</button>

        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Prioridade</th>
                    <th>Data</th>
                    <th>Estado</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabela"></tbody>
        </table>

    </div>

    <div id="modal" class="modal">
        <div class="modal-content">

            <h3>Editar Tarefa</h3>

            <input id="modal-titulo" placeholder="Título">

            <select id="modal-prioridade">
                <option value="Alta">Alta</option>
                <option value="Média">Média</option>
                <option value="Baixa">Baixa</option>
            </select>

            <br><br>

            <button onclick="guardarEdicao()">Guardar</button>
            <button onclick="fecharModal()">Cancelar</button>

        </div>
    </div>

    <script>
        let editId = null;

        async function listar() {
            const response = await fetch("/tarefas");
            const tarefas = await response.json();

            const tabela = document.getElementById("tabela");
            tabela.innerHTML = "";

            tarefas.forEach(t => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${t.id}</td>
                    <td>${t.titulo}</td>
                    <td>${t.prioridade}</td>
                    <td>${t.data_criacao}</td>
                    <td>${t.estado}</td>
                    <td>
                        <button class="btn-edit" onclick="abrirModal(${t.id}, '${t.titulo}', '${t.prioridade}')">Editar</button>
                        <button class="btn-delete" onclick="apagar(${t.id})">Apagar</button>
                    </td>
                `;
                tabela.appendChild(tr);
            });
        }

        async function adicionar() {
            const titulo = document.getElementById("titulo").value;
            const prioridade = document.getElementById("prioridade").value;

            await fetch("/tarefas", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ titulo, prioridade })
            });

            listar();
        }

        async function apagar(id) {
            await fetch(`/tarefas/${id}`, {
                method: "DELETE"
            });

            listar();
        }

        function abrirModal(id, titulo, prioridade) {
            editId = id;

            document.getElementById("modal-titulo").value = titulo;
            document.getElementById("modal-prioridade").value = prioridade;

            document.getElementById("modal").style.display = "block";
        }

        async function guardarEdicao() {
            if (!editId) return;

            const titulo = document.getElementById("modal-titulo").value;
            const prioridade = document.getElementById("modal-prioridade").value;

            await fetch(`/tarefas/${editId}`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({titulo, prioridade})
            });

            fecharModal();
            listar();
        }

        function fecharModal() {
            document.getElementById("modal").style.display = "none";
            editId = null;
        }

        listar();
    </script>
</body>
</html>
